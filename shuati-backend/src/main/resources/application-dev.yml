# 本地开发配置文件

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/shuati
    username: root
    password: 1234
  redis:
    database: 1
    host: localhost
    port: 6379
    timeout: 5000
  elasticsearch:
    uris: http://localhost:9200
    username: root
    password: 123456

nacos:
  config:
    server-addr: 127.0.0.1:8848
    bootstrap:
      enable: true
    data-id: shuati
    group: DEFAULT_GROUP
    type: yaml
    auto-refresh: true

app:
  nacos-listener:
    enabled: true
